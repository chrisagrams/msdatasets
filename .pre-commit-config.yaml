repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: pytest
        name: pytest
        entry: uv run pytest --cov --cov-fail-under=80
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
